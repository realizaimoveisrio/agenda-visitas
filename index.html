<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Realiza Online</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "agenda-realiza.firebaseapp.com",
  projectId: "agenda-realiza",
  storageBucket: "agenda-realiza.firebasestorage.app",
  messagingSenderId: "683247219357",
  appId: "1:683247219357:web:749a3c41c3c2645cb01a74"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const dias = ["Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
let offsetSemana = 0;
let cacheVisitas = [];
let alarmTocando = false;
let alarmesDisparados = {};
let dragVisitaId = null;

let audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
audio.loop = false;

function getInicioSemana() {
  const hoje = new Date();
  const dia = hoje.getDay();
  const segunda = new Date(hoje);
  segunda.setDate(hoje.getDate() - (dia === 0 ? 6 : dia - 1) + (offsetSemana * 7));
  segunda.setHours(0,0,0,0);
  return segunda;
}

function montarBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";
  const inicioSemana = getInicioSemana();
  const hojeStr = new Date().toISOString().split("T")[0];

  dias.forEach((diaNome, i) => {
    const data = new Date(inicioSemana);
    data.setDate(inicioSemana.getDate() + i);
    const dataStr = data.toISOString().split("T")[0];

    const col = document.createElement("div");
    col.className = "col";
    if(dataStr === hojeStr){
      col.classList.add("hoje");
    }

    col.innerHTML = `
      <h3>${diaNome}<br><small>${data.toLocaleDateString()}</small></h3>
      <div class="list" id="dia-${dataStr}"></div>
      <button class="btn-agendar" onclick="abrirModal('${dataStr}')">+ Agendar</button>
    `;
    board.appendChild(col);

    setTimeout(()=>{
      const lista = document.getElementById("dia-"+dataStr);

      lista.ondragover = (e)=>{
        e.preventDefault();
      };

      lista.ondrop = async (e)=>{
        e.preventDefault();
        if(!dragVisitaId) return;

        await updateDoc(doc(db,"visitas",dragVisitaId),{
          data:dataStr
        });

        dragVisitaId = null;
      };

    },0);

  });

  renderizarVisitas();
}

function renderizarVisitas(){
  document.querySelectorAll(".list").forEach(l => l.innerHTML = "");

  const inicioSemana = getInicioSemana();
  const fimSemana = new Date(inicioSemana);
  fimSemana.setDate(inicioSemana.getDate() + 6);

  const visitasOrdenadas = [...cacheVisitas].sort((a,b)=>{
    const dataA = new Date(a.data + "T" + a.hora);
    const dataB = new Date(b.data + "T" + b.hora);
    return dataA - dataB;
  });

  visitasOrdenadas.forEach(v => {

    if(!v.data) return;

    const dataVisita = new Date(v.data);
    if(dataVisita < inicioSemana || dataVisita > fimSemana) return;

    const container = document.getElementById("dia-"+v.data);
    if(container){
      container.innerHTML += `
        <div class="card ${v.concluida ? 'done':''}" draggable="true"
        ondragstart="dragVisitaId='${v.id}'">
          <div>
            <b>${v.hora}</b><br>
            ${v.nome}<br>
            <small>${v.contato || "-"}</small><br>
            <small>${v.imovel || "-"}</small><br>
            <small>${v.obs || "-"}</small><br>
            <small>⏰ ${v.despertar || 0} min antes</small>
          </div>
          <div class="card-actions">
            <span onclick="abrirModal('${v.data}', ${JSON.stringify(v).replace(/"/g,'&quot;')})">✏️</span>
            <span onclick="marcarConcluida('${v.id}', ${v.concluida})">${v.concluida ? '🔵' : '✔️'}</span>
            <span onclick="excluir('${v.id}')">🗑️</span>
          </div>
        </div>
      `;
    }
  });
}

function verificarAlarmes(){
  const agora = new Date();

  cacheVisitas.forEach(v => {

    if(!v.data || !v.hora || !v.despertar || v.concluida) return;
    if(alarmesDisparados[v.id]) return;

    const dataHora = new Date(v.data + "T" + v.hora);
    dataHora.setMinutes(dataHora.getMinutes() - parseInt(v.despertar));

    if(agora >= dataHora && agora < new Date(dataHora.getTime() + 60000)){
      alarmesDisparados[v.id] = true;
      dispararAlarme(v);
    }
  });
}

function dispararAlarme(v){

  if(alarmTocando) return;
  alarmTocando = true;

  audio.play();

  setTimeout(()=>{
    audio.pause();
    audio.currentTime = 0;
    alarmTocando = false;
  },5000);

  document.getElementById("alertaNome").innerText = v.nome;
  document.getElementById("alertaImovel").innerText = v.imovel;
  document.getElementById("modalAlerta").style.display = "flex";

  if ("Notification" in window && Notification.permission === "granted") {
    new Notification("🔔 Visita chegando!", {
      body: `${v.nome} - ${v.imovel}`,
      requireInteraction: true
    });
  }
}

window.pararAlarme = () => {
  audio.pause();
  audio.currentTime = 0;
  document.getElementById("modalAlerta").style.display = "none";
  alarmTocando = false;
};

window.addEventListener("DOMContentLoaded", () => {

montarBoard();

window.semanaAnterior = () => { offsetSemana--; montarBoard(); };
window.semanaProxima = () => { offsetSemana++; montarBoard(); };

window.ativarNotificacao = async () => {
  const permissao = await Notification.requestPermission();
  if (permissao === "granted") alert("Notificações ativadas!");
};

window.abrirModal = (data, visita=null) => {
  dataSelecionada.value = data;
  editId.value = visita ? visita.id : "";
  nome.value = visita ? visita.nome : "";
  contato.value = visita ? visita.contato : "";
  imovel.value = visita ? visita.imovel : "";
  hora.value = visita ? visita.hora : "";
  obs.value = visita ? visita.obs : "";
  despertar.value = visita ? visita.despertar : "";
  modal.style.display = "flex";
};

window.fecharModal = () => modal.style.display = "none";

window.salvarVisita = async () => {

  const id = editId.value;

  const visita = {
    nome: nome.value,
    contato: contato.value,
    imovel: imovel.value,
    hora: hora.value,
    obs: obs.value,
    data: dataSelecionada.value,
    despertar: despertar.value,
    concluida:false
  };

  if(id){
    await updateDoc(doc(db,"visitas",id), visita);
    delete alarmesDisparados[id];
  } else {
    await addDoc(collection(db,"visitas"), visita);
  }

  fecharModal();
};

window.excluir = async (id) => {
  if(confirm("Excluir visita?"))
    await deleteDoc(doc(db,"visitas",id));
};

window.marcarConcluida = async (id, atual) => {
  await updateDoc(doc(db,"visitas",id), {concluida: !atual});
  if(!atual) delete alarmesDisparados[id];
};

onSnapshot(collection(db,"visitas"), (snapshot) => {
  cacheVisitas = [];
  snapshot.forEach(docSnap => {
    const v = docSnap.data();
    v.id = docSnap.id;
    cacheVisitas.push(v);
  });
  renderizarVisitas();
});

setInterval(verificarAlarmes,15000);

});
</script>
