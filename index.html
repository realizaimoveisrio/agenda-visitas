<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda de Visitas</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef2f7;
}

header{
background:#0b3a66;
color:white;
padding:15px;
text-align:center;
}

.header-buttons{
margin-top:10px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.board{
display:flex;
gap:10px;
padding:10px;
overflow-x:auto;
}

.col{
background:#0b3a66;
color:white;
padding:10px;
border-radius:8px;
min-width:220px;
}

.card{
background:white;
color:black;
padding:8px;
margin-bottom:8px;
border-radius:6px;
font-size:13px;
display:flex;
justify-content:space-between;
}

.card.done{
opacity:0.4;
}

.actions{
display:flex;
flex-direction:column;
cursor:pointer;
font-size:18px;
}

.modal,.modal-alerta{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.modal-box{
background:white;
padding:25px;
border-radius:10px;
width:90%;
max-width:400px;
}

.modal-box input,
.modal-box textarea{
width:100%;
padding:10px;
margin-bottom:10px;
}

.alerta-box{
background:#c40000;
color:white;
padding:30px;
border-radius:10px;
text-align:center;
font-size:20px;
}

.alerta-box button{
margin-top:15px;
background:white;
color:#c40000;
font-size:18px;
}

</style>
</head>

<body>

<header>

<h2>Agenda de Visitas</h2>

<div class="header-buttons">

<button onclick="semanaAnterior()">⬅ Semana Anterior</button>

<button onclick="semanaProxima()">Próxima Semana ➡</button>

<button onclick="ativarNotificacao()">🔔 Ativar Notificação</button>

</div>

</header>

<div class="board" id="board"></div>

<div class="modal" id="modal">

<div class="modal-box">

<h3>Agendar Visita</h3>

<input type="hidden" id="dataSelecionada">

<input id="nome" placeholder="Nome do Cliente">

<input id="contato" placeholder="Telefone (DDD+número)">

<input id="imovel" placeholder="Imóvel">

<input id="hora" type="time">

<input id="despertar" type="number" placeholder="Despertar minutos antes">

<textarea id="obs" placeholder="Observação"></textarea>

<button onclick="salvar()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>
</div>

<div class="modal-alerta" id="modalAlerta">

<div class="alerta-box">

🔔 VISITA CHEGANDO

<br><br>

Cliente: <b id="alertaCliente"></b>

<br>

Imóvel: <b id="alertaImovel"></b>

<br><br>

<button onclick="pararAlarme()">OK</button>

</div>
</div>

<script>

const dias=["Seg","Ter","Qua","Qui","Sex","Sab"];

let semanaOffset=0;
let visitas=JSON.parse(localStorage.getItem("visitas")) || [];
let alarmes={};

let audio=new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

function salvarLocal(){
localStorage.setItem("visitas",JSON.stringify(visitas));
}

function inicioSemana(){

let hoje=new Date();
let dia=hoje.getDay();

let segunda=new Date(hoje);

segunda.setDate(hoje.getDate()-(dia===0?6:dia-1)+(semanaOffset*7));
segunda.setHours(0,0,0,0);

return segunda;

}

function montarBoard(){

let board=document.getElementById("board");
board.innerHTML="";

let inicio=inicioSemana();

dias.forEach((d,i)=>{

let data=new Date(inicio);
data.setDate(inicio.getDate()+i);

let dataStr=data.toISOString().split("T")[0];

let col=document.createElement("div");
col.className="col";

col.innerHTML=`
<h3>${d}<br><small>${data.toLocaleDateString()}</small></h3>

<div id="dia-${dataStr}"></div>

<button onclick="abrirModal('${dataStr}')">+ Agendar</button>
`;

board.appendChild(col);

});

renderizar();

}

function renderizar(){

document.querySelectorAll("[id^=dia-]").forEach(d=>d.innerHTML="");

visitas.forEach(v=>{

let el=document.getElementById("dia-"+v.data);

if(!el) return;

let whatsapp=v.contato
? `<a href="https://wa.me/${v.contato}" target="_blank">📲</a>`
:"";

el.innerHTML+=`

<div class="card ${v.concluida?'done':''}">

<div>

<b>${v.hora}</b><br>
${v.nome}<br>
${v.imovel}<br>
${whatsapp}

</div>

<div class="actions">

<span onclick="concluir(${v.id})">✔</span>
<span onclick="excluir(${v.id})">🗑</span>

</div>

</div>

`;

});

}

function abrirModal(data){
modal.style.display="flex";
dataSelecionada.value=data;
}

function fecharModal(){
modal.style.display="none";
}

function salvar(){

let v={
id:Date.now(),
nome:nome.value,
contato:contato.value,
imovel:imovel.value,
hora:hora.value,
obs:obs.value,
data:dataSelecionada.value,
despertar:despertar.value,
concluida:false
};

visitas.push(v);

salvarLocal();

fecharModal();

renderizar();

}

function excluir(id){

visitas=visitas.filter(v=>v.id!==id);

salvarLocal();

renderizar();

}

function concluir(id){

visitas.forEach(v=>{
if(v.id===id)v.concluida=!v.concluida;
});

salvarLocal();

renderizar();

}

function semanaAnterior(){
semanaOffset--;
montarBoard();
}

function semanaProxima(){
semanaOffset++;
montarBoard();
}

function ativarNotificacao(){

if(Notification.permission==="granted"){
alert("Notificações já ativadas");
return;
}

Notification.requestPermission().then(p=>{
if(p==="granted"){
alert("Notificações ativadas!");
}
});

}

function verificarAlarmes(){

let agora=new Date();

visitas.forEach(v=>{

if(!v.despertar||v.concluida)return;

if(alarmes[v.id])return;

let dataHora=new Date(v.data+"T"+v.hora);

dataHora.setMinutes(dataHora.getMinutes()-v.despertar);

if(agora>=dataHora){

alarmes[v.id]=true;

audio.play();

alertaCliente.innerText=v.nome;
alertaImovel.innerText=v.imovel;

modalAlerta.style.display="flex";

if(Notification.permission==="granted"){
new Notification("Visita chegando",{
body:v.nome+" - "+v.imovel
});
}

}

});

}

function pararAlarme(){

audio.pause();
audio.currentTime=0;

modalAlerta.style.display="none";

}

setInterval(verificarAlarmes,15000);

montarBoard();

</script>

</body>
<!-- update -->
</html>
