<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Agenda de Visitas</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.form{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea,select,button{
margin:5px;
padding:8px;
}

.week{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day{
background:white;
border-radius:10px;
padding:10px;
min-height:200px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.day h3{
text-align:center;
}

.card{
background:#e8f3ff;
padding:10px;
border-radius:8px;
margin-top:10px;
cursor:grab;
}

.card.done{
opacity:0.4;
}

.actions{
margin-top:8px;
display:flex;
gap:5px;
flex-wrap:wrap;
}

button{
cursor:pointer;
border:none;
border-radius:6px;
}

.whatsapp{
background:#25D366;
color:white;
}

.doneBtn{
background:#444;
color:white;
}

.editBtn{
background:#007bff;
color:white;
}

.drag-over{
outline:2px dashed #007bff;
}

</style>
</head>

<body>

<h1>Agenda de Visitas</h1>

<div class="form">

<input id="cliente" placeholder="Cliente">

<input id="telefone" placeholder="Telefone">

<input type="date" id="data">

<input type="time" id="hora">

<input type="number" id="alerta" placeholder="Alertar antes (min)">

<textarea id="obs" placeholder="Observação"></textarea>

<br>

<button onclick="criarVisita()">Cadastrar Visita</button>

<button onclick="ativarNotificacao()">Ativar Notificações</button>

</div>

<div class="week" id="week"></div>

<script>

let visitas = JSON.parse(localStorage.getItem("visitas") || "[]")

let dragId = null

function salvar(){
localStorage.setItem("visitas",JSON.stringify(visitas))
}

function criarVisita(){

let visita={
id:Date.now(),
cliente:cliente.value,
telefone:telefone.value,
data:data.value,
hora:hora.value,
alerta:alerta.value,
obs:obs.value,
done:false
}

visitas.push(visita)

salvar()

render()

}

function marcarFeita(id){

let v=visitas.find(v=>v.id==id)

v.done=!v.done

salvar()

render()

}

function editar(id){

let v=visitas.find(v=>v.id==id)

cliente.value=v.cliente
telefone.value=v.telefone
data.value=v.data
hora.value=v.hora
alerta.value=v.alerta
obs.value=v.obs

visitas=visitas.filter(x=>x.id!=id)

salvar()

render()

}

function whatsapp(numero,cliente){

let msg=encodeURIComponent("Olá "+cliente)

window.open("https://wa.me/"+numero+"?text="+msg,"_blank")

}

function ativarNotificacao(){

Notification.requestPermission()

}

function checarAlertas(){

let agora=new Date()

visitas.forEach(v=>{

if(!v.alerta) return

let dataHora=new Date(v.data+"T"+v.hora)

let alerta=new Date(dataHora.getTime()-(v.alerta*60000))

if(Math.abs(agora-alerta)<60000){

if(Notification.permission==="granted"){

new Notification("Visita em breve",{
body:v.cliente+" às "+v.hora
})

}

}

})

}

setInterval(checarAlertas,30000)

function getInicioSemana(){

let d=new Date()

let dia=d.getDay()

let diff=d.getDate()-dia+1

return new Date(d.setDate(diff))

}

function render(){

let week=document.getElementById("week")

week.innerHTML=""

let inicio=getInicioSemana()

for(let i=0;i<7;i++){

let d=new Date(inicio)

d.setDate(inicio.getDate()+i)

let dataStr=d.toISOString().split("T")[0]

let dia=document.createElement("div")
dia.className="day"

dia.dataset.data=dataStr

dia.innerHTML="<h3>"+d.toLocaleDateString()+"</h3>"

dia.ondragover=(e)=>{

e.preventDefault()

dia.classList.add("drag-over")

}

dia.ondragleave=()=>{

dia.classList.remove("drag-over")

}

dia.ondrop=(e)=>{

dia.classList.remove("drag-over")

if(!dragId) return

let v=visitas.find(x=>x.id==dragId)

v.data=dataStr

salvar()

render()

}

visitas
.filter(v=>v.data===dataStr)
.forEach(v=>{

let card=document.createElement("div")

card.className="card"

if(v.done) card.classList.add("done")

card.draggable=true

card.ondragstart=()=>{

dragId=v.id

}

card.innerHTML=`

<strong>${v.cliente}</strong><br>
${v.hora}<br>
${v.obs || ""}

<div class="actions">

<button class="whatsapp" onclick="whatsapp('${v.telefone}','${v.cliente}')">
WhatsApp
</button>

<button class="doneBtn" onclick="marcarFeita(${v.id})">
Feita
</button>

<button class="editBtn" onclick="editar(${v.id})">
Editar
</button>

</div>
`

dia.appendChild(card)

})

week.appendChild(dia)

}

}

render()

</script>

</body>
</html>
