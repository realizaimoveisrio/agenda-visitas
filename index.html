<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Planner de Visitas</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

.topo{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btn-notificacao{
background:#0a7cff;
color:white;
}

.semana{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.dia{
background:white;
border-radius:8px;
padding:10px;
min-height:350px;
border:2px solid transparent;
}

.dia-atual{
border:2px solid gold;
}

.dia h3{
margin-top:0;
}

.card{
background:#e9f2ff;
padding:8px;
border-radius:6px;
margin-bottom:6px;
}

.card button{
margin-right:4px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:300px;
}

.modal-alerta{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.alerta-box{
background:#c40000;
color:white;
padding:30px;
border-radius:10px;
text-align:center;
}

input{
width:100%;
margin-bottom:10px;
padding:6px;
}

</style>
</head>

<body>

<div class="topo">

<div>
<button onclick="semanaAnterior()">⬅ Semana anterior</button>
<button onclick="proximaSemana()">Próxima semana ➡</button>
</div>

<button class="btn-notificacao" onclick="ativarNotificacao()">🔔 Ativar notificações</button>

</div>

<div class="semana" id="agenda"></div>

<!-- MODAL AGENDAR -->

<div class="modal" id="modal">

<div class="modal-content">

<h3 id="tituloModal">Agendar visita</h3>

<input id="nome" placeholder="Nome cliente">
<input id="telefone" placeholder="Telefone">
<input id="imovel" placeholder="Endereço imóvel">
<input type="time" id="hora">

<button onclick="salvarVisita()">Salvar</button>

</div>

</div>

<!-- MODAL ALERTA -->

<div class="modal-alerta" id="modalAlerta">

<div class="alerta-box">

<h2>⚠ VISITA AGORA</h2>

<p id="textoAlerta"></p>

<button onclick="fecharAlerta()">OK</button>

</div>

</div>

<audio id="som">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

let visitas = JSON.parse(localStorage.getItem("visitas")) || [];
let semanaAtual = 0;
let diaSelecionado = null;
let copia = null;
let editando = null;

function salvarLocal(){
localStorage.setItem("visitas",JSON.stringify(visitas));
}

function gerarSemana(){

const agenda=document.getElementById("agenda");
agenda.innerHTML="";

let hoje=new Date();

hoje.setDate(hoje.getDate()+semanaAtual*7);

let inicio=new Date(hoje);
inicio.setDate(hoje.getDate()-hoje.getDay()+1);

for(let i=0;i<7;i++){

let data=new Date(inicio);
data.setDate(inicio.getDate()+i);

let dataStr=data.toISOString().split("T")[0];

let div=document.createElement("div");
div.className="dia";

let hojeReal=new Date().toISOString().split("T")[0];

if(dataStr===hojeReal){
div.classList.add("dia-atual");
}

div.innerHTML=`
<h3>${data.toLocaleDateString()}</h3>
<button onclick="abrirModal('${dataStr}')">Agendar</button>
<button onclick="colar('${dataStr}')">Colar</button>
<div id="lista-${dataStr}"></div>
`;

agenda.appendChild(div);

}

renderizarCards();

}

function abrirModal(data){

diaSelecionado=data;
editando=null;

document.getElementById("modal").style.display="flex";

}

function salvarVisita(){

let nome=document.getElementById("nome").value;
let tel=document.getElementById("telefone").value;
let imovel=document.getElementById("imovel").value;
let hora=document.getElementById("hora").value;

if(editando){

let v=visitas.find(x=>x.id===editando);

v.nome=nome;
v.tel=tel;
v.imovel=imovel;
v.hora=hora;

}else{

visitas.push({

id:Date.now(),
data:diaSelecionado,
nome:nome,
tel:tel,
imovel:imovel,
hora:hora

});

}

salvarLocal();

document.getElementById("modal").style.display="none";

renderizarCards();

verificarAlarmes();

}

function renderizarCards(){

visitas.forEach(v=>{

let lista=document.getElementById("lista-"+v.data);

if(lista){

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<strong>${v.hora}</strong><br>
${v.nome}<br>
${v.imovel}

<br>

<button onclick="copiar(${v.id})">Copiar</button>
<button onclick="editar(${v.id})">Editar</button>

`;

lista.appendChild(card);

}

});

}

function copiar(id){

copia=visitas.find(v=>v.id===id);

}

function colar(data){

if(!copia)return;

visitas.push({

id:Date.now(),
data:data,
nome:copia.nome,
tel:copia.tel,
imovel:copia.imovel,
hora:copia.hora

});

salvarLocal();

gerarSemana();

}

function editar(id){

let v=visitas.find(x=>x.id===id);

editando=id;
diaSelecionado=v.data;

document.getElementById("nome").value=v.nome;
document.getElementById("telefone").value=v.tel;
document.getElementById("imovel").value=v.imovel;
document.getElementById("hora").value=v.hora;

document.getElementById("modal").style.display="flex";

}

function semanaAnterior(){

semanaAtual--;

gerarSemana();

}

function proximaSemana(){

semanaAtual++;

gerarSemana();

}

function ativarNotificacao(){

Notification.requestPermission();

}

function verificarAlarmes(){

setInterval(()=>{

let agora=new Date();

visitas.forEach(v=>{

let dataHora=new Date(v.data+"T"+v.hora);

let diff=(dataHora-agora)/1000;

if(diff<60 && diff>0){

mostrarAlerta(v);

}

});

},30000);

}

function mostrarAlerta(v){

document.getElementById("textoAlerta").innerText=

v.nome+" - "+v.imovel;

document.getElementById("modalAlerta").style.display="flex";

document.getElementById("som").play();

if(Notification.permission==="granted"){

new Notification("Visita agora",{

body:v.nome+" - "+v.imovel

});

}

}

function fecharAlerta(){

document.getElementById("modalAlerta").style.display="none";

}

gerarSemana();

verificarAlarmes();

</script>

</body>
</html>
