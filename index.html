<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Realiza Online</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.board{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:10px;
}

.col{
background:white;
border-radius:10px;
padding:10px;
min-height:400px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.col.hoje{
border:2px solid #007bff;
}

.list{
min-height:300px;
}

.card{
background:#e8f3ff;
padding:10px;
border-radius:8px;
margin-bottom:8px;
cursor:grab;
}

.card.done{
opacity:0.4;
}

.card-actions{
margin-top:5px;
display:flex;
gap:6px;
}

.btn-agendar{
margin-top:8px;
width:100%;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:10px;
width:300px;
}

</style>

</head>
<body>

<div class="topbar">

<button onclick="semanaAnterior()">◀ Semana anterior</button>

<h2>Agenda de Visitas</h2>

<button onclick="semanaProxima()">Próxima semana ▶</button>

<button onclick="ativarNotificacao()">🔔 Ativar Notificações</button>

</div>

<div class="board" id="board"></div>

<div class="modal" id="modal">

<div class="modal-box">

<input type="hidden" id="editId">

<label>Nome</label>
<input id="nome">

<label>Contato</label>
<input id="contato">

<label>Imóvel</label>
<input id="imovel">

<label>Hora</label>
<input id="hora" type="time">

<label>Observação</label>
<textarea id="obs"></textarea>

<label>Despertar (min antes)</label>
<input id="despertar" type="number">

<input type="hidden" id="dataSelecionada">

<br><br>

<button onclick="salvarVisita()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "",

authDomain: "agenda-realiza.firebaseapp.com",

projectId: "agenda-realiza",

storageBucket: "agenda-realiza.appspot.com",

messagingSenderId: "683247219357",

appId: "1:683247219357:web:749a3c41c3c2645cb01a74"

};

let db = null;

try{

const app = initializeApp(firebaseConfig);
db = getFirestore(app);

}catch(e){

console.warn("Firebase não inicializado");

}

const dias=["Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];

let offsetSemana=0;

let cacheVisitas=[];

let dragVisitaId=null;

function getInicioSemana(){

const hoje=new Date();

const dia=hoje.getDay();

const segunda=new Date(hoje);

segunda.setDate(hoje.getDate()-(dia===0?6:dia-1)+(offsetSemana*7));

segunda.setHours(0,0,0,0);

return segunda;

}

function montarBoard(){

const board=document.getElementById("board");

board.innerHTML="";

const inicio=getInicioSemana();

const hojeStr=new Date().toISOString().split("T")[0];

dias.forEach((diaNome,i)=>{

const data=new Date(inicio);

data.setDate(inicio.getDate()+i);

const dataStr=data.toISOString().split("T")[0];

const col=document.createElement("div");

col.className="col";

if(dataStr===hojeStr)col.classList.add("hoje");

col.innerHTML=`

<h3>${diaNome}<br><small>${data.toLocaleDateString()}</small></h3>

<div class="list" id="dia-${dataStr}"></div>

<button class="btn-agendar" onclick="abrirModal('${dataStr}')">+ Agendar</button>

`;

board.appendChild(col);

setTimeout(()=>{

const lista=document.getElementById("dia-"+dataStr);

lista.ondragover=e=>e.preventDefault();

lista.ondrop=async e=>{

e.preventDefault();

if(!dragVisitaId)return;

if(!db)return;

await updateDoc(doc(db,"visitas",dragVisitaId),{data:dataStr});

dragVisitaId=null;

};

},0);

});

renderizarVisitas();

}

function renderizarVisitas(){

document.querySelectorAll(".list").forEach(l=>l.innerHTML="");

const inicio=getInicioSemana();

const fim=new Date(inicio);

fim.setDate(inicio.getDate()+6);

cacheVisitas.forEach(v=>{

if(!v.data)return;

const dataVisita=new Date(v.data);

if(dataVisita<inicio||dataVisita>fim)return;

const container=document.getElementById("dia-"+v.data);

if(container){

container.innerHTML+=`

<div class="card ${v.concluida?'done':''}" draggable="true" ondragstart="dragVisitaId='${v.id}'">

<b>${v.hora}</b><br>

${v.nome}<br>

<small>${v.contato||"-"}</small><br>

<small>${v.imovel||"-"}</small><br>

<small>${v.obs||"-"}</small>

<div class="card-actions">

<span onclick="abrirModal('${v.data}',${JSON.stringify(v).replace(/"/g,'&quot;')})">✏️</span>

<span onclick="marcarConcluida('${v.id}',${v.concluida})">${v.concluida?'🔵':'✔️'}</span>

<span onclick="excluir('${v.id}')">🗑️</span>

</div>

</div>

`;

}

});

}

window.semanaAnterior=()=>{offsetSemana--;montarBoard();}

window.semanaProxima=()=>{offsetSemana++;montarBoard();}

window.abrirModal=(data,v=null)=>{

modal.style.display="flex";

dataSelecionada.value=data;

editId.value=v?v.id:"";

nome.value=v?v.nome:"";

contato.value=v?v.contato:"";

imovel.value=v?v.imovel:"";

hora.value=v?v.hora:"";

obs.value=v?v.obs:"";

despertar.value=v?v.despertar:"";

}

window.fecharModal=()=>modal.style.display="none";

window.salvarVisita=async()=>{

if(!db)return;

const id=editId.value;

const visita={

nome:nome.value,

contato:contato.value,

imovel:imovel.value,

hora:hora.value,

obs:obs.value,

data:dataSelecionada.value,

despertar:despertar.value,

concluida:false

};

if(id){

await updateDoc(doc(db,"visitas",id),visita);

}else{

await addDoc(collection(db,"visitas"),visita);

}

fecharModal();

}

window.excluir=async id=>{

if(!db)return;

if(confirm("Excluir visita?"))

await deleteDoc(doc(db,"visitas",id));

}

window.marcarConcluida=async(id,atual)=>{

if(!db)return;

await updateDoc(doc(db,"visitas",id),{concluida:!atual});

}

if(db){

onSnapshot(collection(db,"visitas"),snap=>{

cacheVisitas=[];

snap.forEach(d=>{

let v=d.data();

v.id=d.id;

cacheVisitas.push(v);

});

renderizarVisitas();

});

}

montarBoard();

</script>

</body>
</html>
