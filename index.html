<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Realiza Online</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "agenda-realiza.firebaseapp.com",
projectId: "agenda-realiza",
storageBucket: "agenda-realiza.firebasestorage.app",
messagingSenderId: "683247219357",
appId: "1:683247219357:web:749a3c41c3c2645cb01a74"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const dias = ["Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];

let offsetSemana = 0;
let cacheVisitas = [];
let alarmTocando = false;
let alarmesDisparados = {};
let visitaCopiada = null;

let audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

function ativarNotificacoes(){

if(!("Notification" in window)){
alert("Seu navegador não suporta notificações");
return;
}

Notification.requestPermission().then(permission=>{
if(permission==="granted"){
alert("Notificações ativadas!");
}else{
alert("Permissão negada.");
}
});

}

function formatarDataLocal(data){
const ano = data.getFullYear();
const mes = String(data.getMonth()+1).padStart(2,"0");
const dia = String(data.getDate()).padStart(2,"0");
return `${ano}-${mes}-${dia}`;
}

function getInicioSemana(){

const hoje = new Date();
const dia = hoje.getDay();

const segunda = new Date(hoje);

segunda.setDate(
hoje.getDate() - (dia === 0 ? 6 : dia - 1) + (offsetSemana * 7)
);

segunda.setHours(0,0,0,0);

return segunda;

}

function montarBoard(){

const board = document.getElementById("board");
board.innerHTML="";

const inicioSemana = getInicioSemana();
const hojeStr = formatarDataLocal(new Date());

dias.forEach((diaNome,i)=>{

const data = new Date(inicioSemana);
data.setDate(inicioSemana.getDate()+i);

const dataStr = formatarDataLocal(data);

const col = document.createElement("div");
col.className="col";

if(dataStr===hojeStr){
col.classList.add("hoje");
}

col.innerHTML=`

<h3>${diaNome}<br><small>${data.toLocaleDateString()}</small></h3>

<div class="list" id="dia-${dataStr}"></div>

<button class="btn-agendar" onclick="abrirModal('${dataStr}')">+ Agendar</button>
<button class="btn-agendar" onclick="colarVisita('${dataStr}')">📋 Colar</button>

`;

board.appendChild(col);

});

renderizarVisitas();

}

function renderizarVisitas(){

document.querySelectorAll(".list").forEach(l=>l.innerHTML="");

const inicioSemana = getInicioSemana();
const fimSemana = new Date(inicioSemana);

fimSemana.setDate(inicioSemana.getDate()+6);

const visitasOrdenadas=[...cacheVisitas].sort((a,b)=>{

const dataA = new Date(a.data+"T"+a.hora);
const dataB = new Date(b.data+"T"+b.hora);

return dataA-dataB;

});

visitasOrdenadas.forEach(v=>{

if(!v.data) return;

const dataVisita = new Date(v.data+"T00:00");

if(dataVisita < inicioSemana || dataVisita > fimSemana) return;

const container = document.getElementById("dia-"+v.data);

if(container){

container.innerHTML+=`

<div class="card ${v.concluida?'done':''}">

<div>

<b>${v.hora}</b><br>
${v.nome}<br>

<small>${v.contato || "-"}</small><br>
<small>${v.imovel || "-"}</small><br>
<small>${v.obs || "-"}</small><br>

<small>⏰ ${v.despertar || 0} min antes</small>

</div>

<div class="card-actions">

<span onclick="abrirWhatsapp('${v.contato}')">💬</span>
<span onclick="copiarVisita(${JSON.stringify(v).replace(/"/g,'&quot;')})">📋</span>
<span onclick="abrirModal('${v.data}', ${JSON.stringify(v).replace(/"/g,'&quot;')})">✏️</span>

<span onclick="marcarConcluida('${v.id}', ${v.concluida})">
${v.concluida ? '🔵' : '✔️'}
</span>

<span onclick="excluir('${v.id}')">🗑️</span>

</div>

</div>

`;

}

});

}

window.copiarVisita=(visita)=>{

visitaCopiada = visita;

alert("Visita copiada! Clique em COLAR no dia desejado.");

}

window.colarVisita=async(data)=>{

if(!visitaCopiada){
alert("Nenhuma visita copiada.");
return;
}

const novaVisita = {
nome:visitaCopiada.nome,
contato:visitaCopiada.contato,
imovel:visitaCopiada.imovel,
hora:visitaCopiada.hora,
obs:visitaCopiada.obs,
data:data,
despertar:visitaCopiada.despertar,
concluida:false
};

await addDoc(collection(db,"visitas"),novaVisita);

}

window.abrirWhatsapp=(numero)=>{

if(!numero){
alert("Número não cadastrado");
return;
}

let numeroLimpo = numero.replace(/\D/g,'');

if(numeroLimpo.length<=11){
numeroLimpo="55"+numeroLimpo;
}

window.open(`https://api.whatsapp.com/send?phone=${numeroLimpo}`,"_blank");

}

window.addEventListener("DOMContentLoaded",()=>{

montarBoard();

window.semanaAnterior=()=>{
offsetSemana--;
montarBoard();
};

window.semanaProxima=()=>{
offsetSemana++;
montarBoard();
};

window.abrirModal=(data,visita=null)=>{

dataSelecionada.value=data;

editId.value=visita?visita.id:"";
nome.value=visita?visita.nome:"";
contato.value=visita?visita.contato:"";
imovel.value=visita?visita.imovel:"";
hora.value=visita?visita.hora:"";
obs.value=visita?visita.obs:"";
despertar.value=visita?visita.despertar:"";

modal.style.display="flex";

};

window.fecharModal=()=>modal.style.display="none";

window.salvarVisita=async()=>{

const id=editId.value;

const visita={
nome:nome.value,
contato:contato.value,
imovel:imovel.value,
hora:hora.value,
obs:obs.value,
data:dataSelecionada.value,
despertar:despertar.value,
concluida:false
};

if(id){
await updateDoc(doc(db,"visitas",id),visita);
}else{
await addDoc(collection(db,"visitas"),visita);
}

fecharModal();

};

window.excluir=async(id)=>{
if(confirm("Excluir visita?"))
await deleteDoc(doc(db,"visitas",id));
};

window.marcarConcluida=async(id,atual)=>{
await updateDoc(doc(db,"visitas",id),{
concluida:!atual
});
};

onSnapshot(collection(db,"visitas"),(snapshot)=>{

cacheVisitas=[];

snapshot.forEach(docSnap=>{
const v=docSnap.data();
v.id=docSnap.id;
cacheVisitas.push(v);
});

renderizarVisitas();

});

});
</script>

<style>

body{margin:0;font-family:Arial;background:#e9eef5}

header{
background:#0b3a66;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

.board{display:flex;gap:10px;padding:10px;overflow-x:auto}

.col{
background:#0b3a66;
color:white;
min-width:220px;
border-radius:8px;
padding:8px;
}

.col.hoje{border:3px solid gold;}

.card{
background:white;
color:#333;
padding:10px;
margin-bottom:8px;
border-radius:6px;
display:flex;
justify-content:space-between;
font-size:13px;
}

.card.done{opacity:0.4}

.card-actions{
display:flex;
flex-direction:column;
font-size:18px;
cursor:pointer;
gap:6px
}

.btn-agendar{
width:100%;
margin-top:6px;
padding:6px;
background:white;
color:#0b3a66;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

button{
padding:6px 10px;
margin:4px;
background:white;
color:#0b3a66;
border:none;
cursor:pointer;
font-weight:bold;
border-radius:5px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:25px;
border-radius:15px;
width:95%;
max-width:400px;
}

.modal-box input,
.modal-box textarea{
width:100%;
margin-bottom:12px;
padding:10px;
box-sizing:border-box;
}

</style>
</head>

<body>

<header>

<div>Agenda Realiza Online</div>

<div>
<button onclick="semanaAnterior()">⬅</button>
<button onclick="semanaProxima()">➡</button>
<button onclick="ativarNotificacoes()">🔔 Ativar Notificações</button>
</div>

</header>

<div class="board" id="board"></div>

<div class="modal" id="modal">

<div class="modal-box">

<h3>Visita</h3>

<input type="hidden" id="dataSelecionada">
<input type="hidden" id="editId">

<input id="nome" placeholder="Nome do Cliente">
<input id="contato" placeholder="Contato">
<input id="imovel" placeholder="Imóvel">
<input id="hora" type="time">
<input id="despertar" type="number" placeholder="Despertar (min antes)">
<textarea id="obs" placeholder="Observação"></textarea>

<button onclick="salvarVisita()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>

</div>

</body>
</html>
