<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Realiza Online</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"SUA_API_KEY",
authDomain:"agenda-realiza.firebaseapp.com",
projectId:"agenda-realiza",
storageBucket:"agenda-realiza.firebasestorage.app",
messagingSenderId:"683247219357",
appId:"1:683247219357:web:749a3c41c3c2645cb01a74"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const dias=["Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];

let cacheVisitas=[];
let alarmesDisparados={};
let offsetSemana=0;

let audio=new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

/* DATA */

function formatarDataLocal(data){
const ano=data.getFullYear();
const mes=String(data.getMonth()+1).padStart(2,"0");
const dia=String(data.getDate()).padStart(2,"0");
return `${ano}-${mes}-${dia}`;
}

/* ALERTA VISITA */

function mostrarModalAlerta(visita){

const fundo=document.createElement("div");

fundo.style.position="fixed";
fundo.style.inset="0";
fundo.style.background="rgba(0,0,0,0.7)";
fundo.style.display="flex";
fundo.style.alignItems="center";
fundo.style.justifyContent="center";
fundo.style.zIndex="99999";

fundo.innerHTML=`

<div style="
background:#ff0000;
color:white;
padding:30px;
border-radius:10px;
font-size:18px;
font-weight:bold;
text-align:center;
max-width:400px">

🚨 VISITA PRÓXIMA 🚨<br><br>

Cliente: ${visita.nome}<br>
Imóvel: ${visita.imovel}<br>
Horário: ${visita.hora}<br><br>

<button id="okAlarme" style="
padding:10px 20px;
font-size:18px;
border:none;
border-radius:6px;
cursor:pointer;">
OK
</button>

</div>
`;

document.body.appendChild(fundo);

const botao=fundo.querySelector("#okAlarme");

botao.addEventListener("click",()=>{
audio.pause();
audio.currentTime=0;
fundo.remove();
});

}

/* ALARME */

function tocarAlarme(visita){

audio.currentTime=0;
audio.play();

setTimeout(()=>{
audio.pause();
audio.currentTime=0;
},5000);

mostrarModalAlerta(visita);

}

/* WHATSAPP */

window.abrirWhats=(contato)=>{

if(!contato){
alert("Número inválido");
return;
}

let numero=contato.replace(/\D/g,"");

if(numero.length===9){
numero="21"+numero;
}

if(numero.length===10){
numero="55"+numero;
}

if(numero.length===11){
numero="55"+numero;
}

if(!numero.startsWith("55")){
numero="55"+numero;
}

window.open(`https://wa.me/${numero}`,"_blank");

};

/* SEMANA */

function getInicioSemana(){

const hoje=new Date();
const dia=hoje.getDay();

const segunda=new Date(hoje);

segunda.setDate(
hoje.getDate()-(dia===0?6:dia-1)+(offsetSemana*7)
);

segunda.setHours(0,0,0,0);

return segunda;

}

window.semanaAnterior=()=>{
offsetSemana--;
montarBoard();
};

window.semanaProxima=()=>{
offsetSemana++;
montarBoard();
};

/* BOARD */

function montarBoard(){

const board=document.getElementById("board");
board.innerHTML="";

const inicioSemana=getInicioSemana();

for(let i=0;i<6;i++){

const data=new Date(inicioSemana);
data.setDate(inicioSemana.getDate()+i);

const dataStr=formatarDataLocal(data);

const col=document.createElement("div");
col.className="col";

col.innerHTML=`

<h3>${dias[i]}<br><small>${data.toLocaleDateString()}</small></h3>

<div class="list" id="dia-${dataStr}"></div>

`;

board.appendChild(col);

}

renderizarVisitas();

}

/* RENDER VISITAS */

function renderizarVisitas(){

document.querySelectorAll(".list").forEach(l=>l.innerHTML="");

const visitasOrdenadas=[...cacheVisitas].sort((a,b)=>{
return (a.hora||"").localeCompare(b.hora||"");
});

visitasOrdenadas.forEach(v=>{

const lista=document.getElementById("dia-"+v.data);
if(!lista)return;

lista.innerHTML+=`

<div class="card">

<div>

<b>${v.hora}</b><br>
${v.nome}<br>
${v.imovel}<br>
${v.contato}

</div>

<div>

<span onclick="abrirWhats('${v.contato}')">💬</span>

</div>

</div>

`;

});

}

/* FIREBASE */

window.addEventListener("DOMContentLoaded",()=>{

montarBoard();

setInterval(()=>{

const agora=new Date().getTime();

cacheVisitas.forEach(v=>{

if(!v.data||!v.hora)return;

const chave=v.id;

const horario=new Date(v.data+"T"+v.hora);

horario.setMinutes(horario.getMinutes()-parseInt(v.despertar||0));

const tempo=horario.getTime();

if(agora>=tempo&&!alarmesDisparados[chave]){

alarmesDisparados[chave]=true;

tocarAlarme(v);

}

});

},5000);

onSnapshot(collection(db,"visitas"),(snapshot)=>{

cacheVisitas=[];

snapshot.forEach(docSnap=>{
const v=docSnap.data();
v.id=docSnap.id;
cacheVisitas.push(v);
});

renderizarVisitas();

});

});

</script>

<style>

body{
margin:0;
font-family:Arial;
background:#e9eef5;
}

header{
background:#0b3a66;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.board{
display:flex;
gap:10px;
padding:10px;
overflow-x:auto;
}

.col{
background:#0b3a66;
color:white;
min-width:230px;
padding:8px;
border-radius:8px;
}

.card{
background:white;
color:#333;
padding:8px;
margin-bottom:8px;
border-radius:6px;
display:flex;
justify-content:space-between;
font-size:13px;
}

</style>

</head>

<body>

<header>

<div>Agenda Realiza Online</div>

<div>

<button onclick="semanaAnterior()">⬅ Semana anterior</button>

<button onclick="semanaProxima()">Semana seguinte ➡</button>

</div>

</header>

<div class="board" id="board"></div>

</body>
</html>
