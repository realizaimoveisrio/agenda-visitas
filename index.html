<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Agenda de Visitas</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

#notificacao{
display:block;
margin:auto;
margin-bottom:20px;
padding:10px 20px;
background:gold;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.calendario{
display:flex;
gap:20px;
overflow-x:auto;
}

.dia{
min-width:270px;
background:#1d1d1d;
padding:10px;
border-radius:10px;
}

.dia.hoje{
border:3px solid gold;
}

.card{
display:flex;
justify-content:space-between;
background:#2a2a2a;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.card.visitado{
opacity:0.4;
}

.info{
display:flex;
flex-direction:column;
gap:3px;
font-size:14px;
}

.icones{
display:flex;
flex-direction:column;
gap:8px;
font-size:18px;
}

.icones span{
cursor:pointer;
}

.icones a{
text-decoration:none;
}

</style>
</head>

<body>

<h1>Agenda de Visitas</h1>

<button id="notificacao">🔔 Ativar notificações</button>

<div class="calendario" id="calendario"></div>

<script>

let visitas=[

{
id:1,
data:"2026-03-05",
cliente:"João Silva",
telefone:"5521999999999",
imovel:"Rua das Flores 120",
hora:"14:00",
alerta:30,
obs:"Cliente interessado em financiamento",
visitado:false
},

{
id:2,
data:"2026-03-05",
cliente:"Maria Souza",
telefone:"5521988888888",
imovel:"Av Brasil 500",
hora:"16:00",
alerta:20,
obs:"Levar chave do portão",
visitado:false
}

]

function render(){

const calendario=document.getElementById("calendario")
calendario.innerHTML=""

const hoje=new Date().toISOString().slice(0,10)

const dias=[...new Set(visitas.map(v=>v.data))]

dias.forEach(data=>{

const coluna=document.createElement("div")
coluna.className="dia"

if(data===hoje){
coluna.classList.add("hoje")
}

coluna.innerHTML="<h3>"+data.split("-").reverse().join("/")+"</h3>"

visitas.filter(v=>v.data===data).forEach(v=>{

const card=document.createElement("div")
card.className="card"

if(v.visitado){
card.classList.add("visitado")
}

card.innerHTML=`

<div class="info">

<div><b>👤 Cliente:</b> ${v.cliente}</div>
<div><b>📞 Telefone:</b> ${v.telefone}</div>
<div><b>🏠 Imóvel:</b> ${v.imovel}</div>
<div><b>⏰ Hora:</b> ${v.hora}</div>
<div><b>⏱ Avisar:</b> ${v.alerta} min antes</div>
<div><b>📝 Obs:</b> ${v.obs}</div>

</div>

<div class="icones">

<a href="https://wa.me/${v.telefone}" target="_blank">💬</a>

<span onclick="toggleVisitado(${v.id})">✔️</span>

<span onclick="editar(${v.id})">✏️</span>

<span onclick="remover(${v.id})">🗑️</span>

</div>
`

coluna.appendChild(card)

})

calendario.appendChild(coluna)

})

}

function toggleVisitado(id){

const v=visitas.find(x=>x.id===id)

v.visitado=!v.visitado

render()

}

function remover(id){

visitas=visitas.filter(v=>v.id!==id)

render()

}

function editar(id){

const v=visitas.find(x=>x.id===id)

const cliente=prompt("Cliente:",v.cliente)
const telefone=prompt("Telefone:",v.telefone)
const imovel=prompt("Imóvel:",v.imovel)
const hora=prompt("Hora:",v.hora)
const alerta=prompt("Minutos antes:",v.alerta)
const obs=prompt("Observação:",v.obs)

if(cliente)v.cliente=cliente
if(telefone)v.telefone=telefone
if(imovel)v.imovel=imovel
if(hora)v.hora=hora
if(alerta)v.alerta=alerta
if(obs)v.obs=obs

render()

}

render()

document.getElementById("notificacao").onclick=function(){

if(Notification.permission==="granted"){

new Notification("Notificações ativadas")

}

else if(Notification.permission!=="denied"){

Notification.requestPermission().then(p=>{

if(p==="granted"){

new Notification("Notificações ativadas")

}

})

}

}

</script>

</body>
</html>
