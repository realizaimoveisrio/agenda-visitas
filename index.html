<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Realiza Online</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "agenda-realiza.firebaseapp.com",
projectId: "agenda-realiza",
storageBucket: "agenda-realiza.firebasestorage.app",
messagingSenderId: "683247219357",
appId: "1:683247219357:web:749a3c41c3c2645cb01a74"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const dias = ["Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];

let offsetSemana = 0;
let cacheVisitas = [];
let alarmTocando = false;
let alarmesDisparados = {};
let draggedId = null;

let audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

function getInicioSemana(){

const hoje = new Date();
const dia = hoje.getDay();

const segunda = new Date(hoje);

segunda.setDate(
hoje.getDate() - (dia === 0 ? 6 : dia - 1) + (offsetSemana * 7)
);

segunda.setHours(0,0,0,0);

return segunda;

}

function montarBoard(){

const board = document.getElementById("board");
board.innerHTML="";

const inicioSemana = getInicioSemana();
const hojeStr = new Date().toISOString().split("T")[0];

dias.forEach((diaNome,i)=>{

const data = new Date(inicioSemana);
data.setDate(inicioSemana.getDate()+i);

const dataStr = data.toISOString().split("T")[0];

const col = document.createElement("div");
col.className="col";

if(dataStr===hojeStr){
col.classList.add("hoje");
}

col.innerHTML=`

<h3>${diaNome}<br><small>${data.toLocaleDateString()}</small></h3>

<div class="list"
id="dia-${dataStr}"
data-dia="${dataStr}"
ondragover="event.preventDefault()"
ondrop="soltarCard(event)">
</div>

<button onclick="abrirModal('${dataStr}')">+ Visita</button>

`;

board.appendChild(col);

});

renderVisitas();

}

function renderVisitas(){

document.querySelectorAll(".list").forEach(l=>l.innerHTML="");

const inicioSemana = getInicioSemana();
const fimSemana = new Date(inicioSemana);

fimSemana.setDate(inicioSemana.getDate()+6);

const visitasOrdenadas=[...cacheVisitas].sort((a,b)=>{

if(a.data===b.data) return a.hora.localeCompare(b.hora);
return a.data.localeCompare(b.data);

});

visitasOrdenadas.forEach(v=>{

if(!v.data) return;

/* CORREÇÃO AQUI */
const dataVisita = new Date(v.data + "T00:00");

if(dataVisita < inicioSemana || dataVisita > fimSemana) return;

const container = document.getElementById("dia-"+v.data);

if(container){

container.innerHTML+=`

<div class="card ${v.concluida?'done':''}" draggable="true" ondragstart="arrastarCard('${v.id}')">

<div>

<b>${v.hora}</b><br>
${v.nome}<br>

<small>${v.contato || "-"}</small><br>
<small>${v.imovel || "-"}</small><br>
<small>${v.obs || "-"}</small><br>

<small>⏰ ${v.despertar || 0} min antes</small>

</div>

<div class="card-actions">

<span onclick="abrirWhatsapp('${v.contato}')">💬</span>
<span onclick="abrirModal('${v.data}', ${JSON.stringify(v).replace(/"/g,'&quot;')})">✏️</span>

<span onclick="marcarConcluida('${v.id}', ${v.concluida})">
${v.concluida ? '🔵' : '✔️'}
</span>

<span onclick="excluir('${v.id}')">🗑️</span>

</div>
</div>

`;

}

});

}

onSnapshot(collection(db,"visitas"),snapshot=>{

cacheVisitas=[];

snapshot.forEach(doc=>{

cacheVisitas.push({id:doc.id,...doc.data()});

});

renderVisitas();

});

window.abrirWhatsapp=(telefone)=>{

if(!telefone) return;

let numero = telefone.replace(/\D/g,'');

if(!numero.startsWith("55")){
numero="55"+numero;
}

window.open("https://wa.me/"+numero,"_blank");

};

window.abrirModal=(data,visita=null)=>{

document.getElementById("modal").style.display="flex";

dataSelecionada.value=data;

if(visita){

idVisita.value=visita.id;
nome.value=visita.nome;
contato.value=visita.contato;
imovel.value=visita.imovel;
hora.value=visita.hora;
obs.value=visita.obs;
despertar.value=visita.despertar;

}else{

idVisita.value="";
nome.value="";
contato.value="";
imovel.value="";
hora.value="";
obs.value="";
despertar.value="";

}

};

window.fecharModal=()=>{

modal.style.display="none";

};

window.salvarVisita=async()=>{

const id=idVisita.value;

const visita={

nome:nome.value,
contato:contato.value,
imovel:imovel.value,
hora:hora.value,
obs:obs.value,
data:dataSelecionada.value,
despertar:despertar.value,
concluida:false

};

if(id){

await updateDoc(doc(db,"visitas",id),visita);

}else{

await addDoc(collection(db,"visitas"),visita);

}

fecharModal();

};

window.excluir=async(id)=>{

if(confirm("Excluir visita?"))

await deleteDoc(doc(db,"visitas",id));

};

window.marcarConcluida=async(id,status)=>{

await updateDoc(doc(db,"visitas",id),{
concluida:!status
});

};

document.addEventListener("DOMContentLoaded",()=>{

montarBoard();

window.semanaAnterior=()=>{

offsetSemana--;
montarBoard();

};

window.semanaProxima=()=>{

offsetSemana++;
montarBoard();

};

});
</script>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0b3d91;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.board{
display:flex;
gap:10px;
padding:10px;
}

.col{
background:white;
padding:10px;
border-radius:6px;
flex:1;
min-height:500px;
}

.hoje{
border:3px solid #0b3d91;
}

.list{
min-height:400px;
}

.card{
background:#eee;
padding:6px;
margin-bottom:6px;
border-radius:4px;
cursor:grab;
display:flex;
justify-content:space-between;
}

.done{
opacity:0.5;
text-decoration:line-through;
}

.card-actions span{
cursor:pointer;
margin-left:5px;
}

button{
cursor:pointer;
}

#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0008;
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:6px;
width:300px;
}

.modal-box input,
.modal-box textarea{
width:100%;
margin-bottom:5px;
}

</style>
</head>

<body>

<header>

<h2>Agenda Realiza Online</h2>

<div>

<button onclick="semanaAnterior()">⬅</button>
<button onclick="semanaProxima()">➡</button>

</div>

</header>

<div class="board" id="board"></div>

<div id="modal">

<div class="modal-box">

<input type="hidden" id="idVisita">
<input type="hidden" id="dataSelecionada">

<input id="nome" placeholder="Nome">

<input id="contato" placeholder="Telefone">

<input id="imovel" placeholder="Imóvel">

<input id="hora" type="time">

<input id="despertar" type="number" placeholder="Alarme (min antes)">

<textarea id="obs" placeholder="Observação"></textarea>

<button onclick="salvarVisita()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>

</div>

</body>
</html>
