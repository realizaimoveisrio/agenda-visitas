<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Realiza Online</title>

<script type="module">

/* ---------------- FIREBASE ---------------- */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"SUA_API_KEY",
authDomain:"agenda-realiza.firebaseapp.com",
projectId:"agenda-realiza",
storageBucket:"agenda-realiza.firebasestorage.app",
messagingSenderId:"683247219357",
appId:"1:683247219357:web:749a3c41c3c2645cb01a74"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* ---------------- VARIÁVEIS ---------------- */

const dias=["Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];

let cacheVisitas=[];
let alarmesDisparados={};

let audio=new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

/* ---------------- UTIL ---------------- */

function formatarDataLocal(data){

const ano=data.getFullYear();
const mes=String(data.getMonth()+1).padStart(2,"0");
const dia=String(data.getDate()).padStart(2,"0");

return `${ano}-${mes}-${dia}`;

}

/* ---------------- ALARME ---------------- */

function tocarAlarme(visita){

audio.currentTime=0;
audio.play();

setTimeout(()=>{
audio.pause();
audio.currentTime=0;
},5000);

mostrarModal(visita);

}

function mostrarModal(visita){

const fundo=document.createElement("div");

fundo.className="modal-alerta";

fundo.innerHTML=`

<div class="alerta-box">

🚨 VISITA PRÓXIMA 🚨<br><br>

Cliente: ${visita.nome}<br>
Imóvel: ${visita.imovel}<br>
Hora: ${visita.hora}

<br><br>

<button id="okAlarme">OK</button>

</div>
`;

document.body.appendChild(fundo);

document.getElementById("okAlarme").onclick=()=>{
fundo.remove();
};

}

function verificarAlarmes(){

const agora=new Date().getTime();

cacheVisitas.forEach(v=>{

if(!v.data||!v.hora)return;

const chave=v.id;

const horario=new Date(v.data+"T"+v.hora);

horario.setMinutes(horario.getMinutes()-parseInt(v.despertar||0));

const tempo=horario.getTime();

if(agora>=tempo&&!alarmesDisparados[chave]&&!v.concluida){

alarmesDisparados[chave]=true;

tocarAlarme(v);

}

});

}

/* ---------------- BOARD ---------------- */

function montarBoard(){

const board=document.getElementById("board");
board.innerHTML="";

const hoje=new Date();

for(let i=0;i<6;i++){

const data=new Date();
data.setDate(hoje.getDate()+i);

const dataStr=formatarDataLocal(data);

const col=document.createElement("div");
col.className="col";

col.innerHTML=`

<h3>${dias[i]}<br><small>${data.toLocaleDateString()}</small></h3>

<div class="list" id="dia-${dataStr}"></div>

<button onclick="abrirModal('${dataStr}')">+ Agendar</button>

`;

board.appendChild(col);

}

renderizarVisitas();

}

/* ---------------- RENDER ---------------- */

function renderizarVisitas(){

document.querySelectorAll(".list").forEach(l=>l.innerHTML="");

cacheVisitas.forEach(v=>{

const lista=document.getElementById("dia-"+v.data);

if(!lista)return;

lista.innerHTML+=`

<div class="card ${v.concluida?'done':''}">

<div class="card-info">

<b>${v.hora}</b>

<span>${v.nome}</span>

<span>${v.imovel}</span>

<span>${v.contato}</span>

<small>⏰ ${v.despertar} min antes</small>

<small>${v.obs||""}</small>

</div>

<div class="card-actions">

<span onclick="abrirWhats('${v.contato}')">💬</span>

<span onclick="copiarCard('${v.nome}','${v.imovel}','${v.hora}')">📋</span>

<span onclick="editarVisita('${v.id}')">✏</span>

<span onclick="marcarVisitado('${v.id}',${v.concluida})">✔</span>

<span onclick="apagarVisita('${v.id}')">🗑</span>

</div>

</div>

`;

});

}

/* ---------------- BOTÕES ---------------- */

window.abrirWhats=(contato)=>{
window.open(`https://wa.me/55${contato}`,"_blank");
};

window.copiarCard=(nome,imovel,hora)=>{

navigator.clipboard.writeText(
`Visita\nCliente:${nome}\nImóvel:${imovel}\nHora:${hora}`
);

alert("Card copiado");

};

window.marcarVisitado=async(id,status)=>{

await updateDoc(doc(db,"visitas",id),{
concluida:!status
});

};

window.apagarVisita=async(id)=>{

if(confirm("Apagar visita?")){

await deleteDoc(doc(db,"visitas",id));

}

};

window.editarVisita=(id)=>{

const v=cacheVisitas.find(x=>x.id===id);

const nome=prompt("Cliente",v.nome);
const imovel=prompt("Imóvel",v.imovel);

updateDoc(doc(db,"visitas",id),{nome,imovel});

};

/* ---------------- AGENDAR ---------------- */

window.abrirModal=(data)=>{

document.getElementById("modalData").value=data;

document.getElementById("modal").style.display="flex";

};

window.salvarVisita=async()=>{

const nome=document.getElementById("cliente").value;
const contato=document.getElementById("contato").value;
const imovel=document.getElementById("imovel").value;
const hora=document.getElementById("hora").value;
const despertar=document.getElementById("despertar").value;
const obs=document.getElementById("obs").value;
const data=document.getElementById("modalData").value;

await addDoc(collection(db,"visitas"),{

nome,
contato,
imovel,
hora,
despertar,
obs,
data,
concluida:false

});

fecharModal();

};

window.fecharModal=()=>{
document.getElementById("modal").style.display="none";
};

/* ---------------- FIRESTORE ---------------- */

window.addEventListener("DOMContentLoaded",()=>{

montarBoard();

setInterval(verificarAlarmes,5000);

onSnapshot(collection(db,"visitas"),(snapshot)=>{

cacheVisitas=[];

snapshot.forEach(docSnap=>{

const v=docSnap.data();
v.id=docSnap.id;

cacheVisitas.push(v);

});

renderizarVisitas();

});

});

</script>

<style>

body{
margin:0;
font-family:Arial;
background:#e9eef5;
}

header{
background:#0b3a66;
color:white;
padding:15px;
}

.board{
display:flex;
gap:10px;
padding:10px;
overflow-x:auto;
}

.col{
background:#0b3a66;
color:white;
min-width:230px;
padding:8px;
border-radius:8px;
}

.card{
background:white;
color:#333;
padding:8px;
margin-bottom:8px;
border-radius:6px;
display:flex;
justify-content:space-between;
font-size:13px;
}

.card.done{
opacity:0.4;
}

.card-info{
display:flex;
flex-direction:column;
gap:2px;
}

.card-actions{
display:flex;
flex-direction:column;
gap:6px;
font-size:18px;
cursor:pointer;
}

button{
margin-top:5px;
padding:6px;
border:none;
border-radius:5px;
cursor:pointer;
}

/* modal */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:8px;
width:300px;
display:flex;
flex-direction:column;
gap:8px;
}

.modal-box input,
.modal-box textarea{
padding:6px;
}

.modal-alerta{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:flex;
align-items:center;
justify-content:center;
}

.alerta-box{
background:red;
color:white;
padding:30px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<header>
Agenda Realiza Online
</header>

<div class="board" id="board"></div>

<!-- MODAL AGENDAR -->

<div class="modal" id="modal">

<div class="modal-box">

<input type="hidden" id="modalData">

<label>Cliente</label>
<input id="cliente">

<label>Contato (WhatsApp)</label>
<input id="contato">

<label>Imóvel</label>
<input id="imovel">

<label>Hora</label>
<input type="time" id="hora">

<label>Despertar antes (min)</label>
<input type="number" id="despertar" value="10">

<label>Observação</label>
<textarea id="obs"></textarea>

<button onclick="salvarVisita()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>

</div>

</body>
</html>
