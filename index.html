<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Realiza Online</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "agenda-realiza.firebaseapp.com",
projectId: "agenda-realiza",
storageBucket: "agenda-realiza.firebasestorage.app",
messagingSenderId: "683247219357",
appId: "1:683247219357:web:749a3c41c3c2645cb01a74"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const dias = ["Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];

let offsetSemana = 0;
let cacheVisitas = [];
let alarmesDisparados = {};

let audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

function tocarAlarme(visita){

audio.currentTime=0;
audio.play();

setTimeout(()=>{
audio.pause();
audio.currentTime=0;
},5000);

mostrarModal(visita);

}

function mostrarModal(visita){

const fundo=document.createElement("div");

fundo.style.position="fixed";
fundo.style.inset="0";
fundo.style.background="rgba(0,0,0,0.7)";
fundo.style.display="flex";
fundo.style.alignItems="center";
fundo.style.justifyContent="center";
fundo.style.zIndex="9999";

fundo.innerHTML=`

<div style="background:#ff0000;color:white;padding:30px;border-radius:10px;text-align:center;font-weight:bold">

🚨 VISITA PRÓXIMA 🚨<br><br>

Cliente: ${visita.nome}<br>
Imóvel: ${visita.imovel}<br>
Horário: ${visita.hora}<br><br>

<button id="okAlarme">OK</button>

</div>
`;

document.body.appendChild(fundo);

document.getElementById("okAlarme").onclick=()=>{
fundo.remove();
};

}

function verificarAlarmes(){

const agora = new Date().getTime();

cacheVisitas.forEach(v=>{

if(!v.data || !v.hora) return;

const chave=v.id;

const horarioVisita = new Date(v.data+"T"+v.hora);

const minutosAntes=parseInt(v.despertar || 0);

horarioVisita.setMinutes(horarioVisita.getMinutes()-minutosAntes);

const tempoAlarme = horarioVisita.getTime();

if(agora >= tempoAlarme && !alarmesDisparados[chave] && !v.concluida){

alarmesDisparados[chave]=true;

tocarAlarme(v);

}

});

}

window.abrirWhats=(nome)=>{
window.open(`https://wa.me/?text=Olá ${nome}, confirmando a visita.`,"_blank");
};

window.copiarCard=(nome,imovel,hora)=>{

navigator.clipboard.writeText(
`Visita\nCliente: ${nome}\nImóvel: ${imovel}\nHorário: ${hora}`
);

alert("Card copiado");

};

window.editarVisita=async(id)=>{

const v=cacheVisitas.find(x=>x.id===id);

const nome=prompt("Cliente",v.nome);
if(nome===null)return;

const imovel=prompt("Imóvel",v.imovel);

await updateDoc(doc(db,"visitas",id),{
nome,
imovel
});

};

window.marcarVisitado=async(id,status)=>{

await updateDoc(doc(db,"visitas",id),{
concluida:!status
});

};

window.apagarVisita=async(id)=>{

if(confirm("Apagar visita?")){

await deleteDoc(doc(db,"visitas",id));

}

};

window.abrirModal=(data)=>{

const nome=prompt("Cliente");
if(!nome)return;

const imovel=prompt("Imóvel");

const hora=prompt("Hora (ex: 14:30)");

const despertar=prompt("Minutos antes para alarme",10);

addDoc(collection(db,"visitas"),{

nome,
imovel,
hora,
data,
despertar,
concluida:false

});

};

function formatarDataLocal(data){

const ano=data.getFullYear();
const mes=String(data.getMonth()+1).padStart(2,"0");
const dia=String(data.getDate()).padStart(2,"0");

return `${ano}-${mes}-${dia}`;

}

function getInicioSemana(){

const hoje=new Date();
const dia=hoje.getDay();

const segunda=new Date(hoje);

segunda.setDate(
hoje.getDate()-(dia===0?6:dia-1)+(offsetSemana*7)
);

segunda.setHours(0,0,0,0);

return segunda;

}

function montarBoard(){

const board=document.getElementById("board");
board.innerHTML="";

const inicioSemana=getInicioSemana();
const hojeStr=formatarDataLocal(new Date());

dias.forEach((diaNome,i)=>{

const data=new Date(inicioSemana);
data.setDate(inicioSemana.getDate()+i);

const dataStr=formatarDataLocal(data);

const col=document.createElement("div");
col.className="col";

if(dataStr===hojeStr){
col.classList.add("hoje");
}

col.innerHTML=`

<h3>${diaNome}<br><small>${data.toLocaleDateString()}</small></h3>

<div class="list" id="dia-${dataStr}"></div>

<button class="btn-agendar" onclick="abrirModal('${dataStr}')">+ Agendar</button>

`;

board.appendChild(col);

});

renderizarVisitas();

}

function renderizarVisitas(){

document.querySelectorAll(".list").forEach(l=>l.innerHTML="");

cacheVisitas.forEach(v=>{

const container=document.getElementById("dia-"+v.data);

if(container){

container.innerHTML+=`

<div class="card ${v.concluida?'done':''}">

<div>

<b>${v.hora}</b><br>
${v.nome}<br>
${v.imovel}<br>
<small>⏰ ${v.despertar} min antes</small>

</div>

<div class="card-actions">

<span onclick="abrirWhats('${v.nome}')">💬</span>
<span onclick="copiarCard('${v.nome}','${v.imovel}','${v.hora}')">📋</span>
<span onclick="editarVisita('${v.id}')">✏</span>
<span onclick="marcarVisitado('${v.id}',${v.concluida})">✔</span>
<span onclick="apagarVisita('${v.id}')">🗑</span>

</div>

</div>

`;

}

});

}

window.addEventListener("DOMContentLoaded",()=>{

montarBoard();

setInterval(verificarAlarmes,5000);

onSnapshot(collection(db,"visitas"),(snapshot)=>{

cacheVisitas=[];

snapshot.forEach(docSnap=>{
const v=docSnap.data();
v.id=docSnap.id;
cacheVisitas.push(v);
});

renderizarVisitas();

});

});

</script>

<style>

body{margin:0;font-family:Arial;background:#e9eef5}

header{
background:#0b3a66;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.board{
display:flex;
gap:10px;
padding:10px;
overflow-x:auto;
}

.col{
background:#0b3a66;
color:white;
min-width:220px;
border-radius:8px;
padding:8px;
}

.card{
background:white;
color:#333;
padding:8px;
margin-bottom:8px;
border-radius:6px;
display:flex;
justify-content:space-between;
font-size:13px;
}

.card.done{
opacity:0.4;
}

.card-actions{
display:flex;
flex-direction:column;
gap:6px;
font-size:18px;
cursor:pointer;
}

button{
padding:6px 10px;
background:white;
color:#0b3a66;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<div>Agenda Realiza Online</div>

<div>
<button onclick="ativarNotificacoes()">🔔 Ativar Notificações</button>
</div>

</header>

<div class="board" id="board"></div>

</body>
</html>
