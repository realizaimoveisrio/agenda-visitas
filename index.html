<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Realiza Online</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"SUA_API_KEY",
authDomain:"agenda-realiza.firebaseapp.com",
projectId:"agenda-realiza",
storageBucket:"agenda-realiza.firebasestorage.app",
messagingSenderId:"683247219357",
appId:"1:683247219357:web:749a3c41c3c2645cb01a74"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const dias=["Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];

let cacheVisitas=[];
let alarmesDisparados={};
let offsetSemana=0;

let visitaCopiada=null;
let editandoId=null;

let audio=new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

/* DATA */

function formatarDataLocal(data){

const ano=data.getFullYear();
const mes=String(data.getMonth()+1).padStart(2,"0");
const dia=String(data.getDate()).padStart(2,"0");

return `${ano}-${mes}-${dia}`;

}

/* NOTIFICAÇÕES */

window.ativarNotificacoes=()=>{

if(!("Notification" in window)){
alert("Seu navegador não suporta notificações.");
return;
}

Notification.requestPermission().then(permission=>{
if(permission==="granted"){
alert("🔔 Notificações ativadas!");
}
});

};

/* MODAL ALERTA VERMELHO */

function mostrarModalAlerta(visita){

const fundo=document.createElement("div");

fundo.style.position="fixed";
fundo.style.inset="0";
fundo.style.background="rgba(0,0,0,0.7)";
fundo.style.display="flex";
fundo.style.alignItems="center";
fundo.style.justifyContent="center";
fundo.style.zIndex="9999";

fundo.innerHTML=`

<div style="
background:#ff0000;
color:white;
padding:30px;
border-radius:10px;
font-size:18px;
font-weight:bold;
text-align:center;
max-width:400px">

🚨 VISITA PRÓXIMA 🚨<br><br>

Cliente: ${visita.nome}<br>
Imóvel: ${visita.imovel}<br>
Horário: ${visita.hora}<br><br>

<button id="okAlarme"
style="padding:10px 20px;font-size:18px;border:none;border-radius:6px;cursor:pointer;">
OK
</button>

</div>

`;

document.body.appendChild(fundo);

setTimeout(()=>{

const btn=document.getElementById("okAlarme");

if(btn){
btn.addEventListener("click",()=>{
fundo.remove();
});
}

},10);

}

/* ALARME */

function tocarAlarme(visita){

audio.currentTime=0;
audio.play();

setTimeout(()=>{
audio.pause();
audio.currentTime=0;
},5000);

mostrarModalAlerta(visita);

if(Notification.permission==="granted"){

new Notification("Visita próxima",{
body:`${visita.nome} - ${visita.hora}`
});

}

}

/* SEMANA */

function getInicioSemana(){

const hoje=new Date();
const dia=hoje.getDay();

const segunda=new Date(hoje);

segunda.setDate(
hoje.getDate()-(dia===0?6:dia-1)+(offsetSemana*7)
);

segunda.setHours(0,0,0,0);

return segunda;

}

window.semanaAnterior=()=>{
offsetSemana--;
montarBoard();
};

window.semanaProxima=()=>{
offsetSemana++;
montarBoard();
};

/* BOARD */

function montarBoard(){

const board=document.getElementById("board");
board.innerHTML="";

const inicioSemana=getInicioSemana();
const hojeStr=formatarDataLocal(new Date());

for(let i=0;i<6;i++){

const data=new Date(inicioSemana);
data.setDate(inicioSemana.getDate()+i);

const dataStr=formatarDataLocal(data);

const col=document.createElement("div");
col.className="col";

if(dataStr===hojeStr){
col.classList.add("hoje");
}

col.innerHTML=`

<h3>${dias[i]}<br><small>${data.toLocaleDateString()}</small></h3>

<div class="list" id="dia-${dataStr}"></div>

<button onclick="abrirModal('${dataStr}')">+ Agendar</button>
<button onclick="colarVisita('${dataStr}')">📥 Colar</button>

`;

board.appendChild(col);

}

renderizarVisitas();

}

/* RENDER */

function renderizarVisitas(){

document.querySelectorAll(".list").forEach(l=>l.innerHTML="");

/* ORDENAÇÃO 100% POR HORÁRIO */

const visitasOrdenadas=[...cacheVisitas].sort((a,b)=>{

const [ha,ma]=(a.hora||"0:0").split(":").map(Number);
const [hb,mb]=(b.hora||"0:0").split(":").map(Number);

return (ha*60+ma)-(hb*60+mb);

});

visitasOrdenadas.forEach(v=>{

const lista=document.getElementById("dia-"+v.data);

if(!lista)return;

lista.innerHTML+=`

<div class="card ${v.concluida?'done':''}">

<div class="card-info">

<b>${v.hora}</b>
<span>${v.nome}</span>
<span>${v.imovel}</span>
<span>${v.contato}</span>

<small>⏰ ${v.despertar} min antes</small>
<small>${v.obs||""}</small>

</div>

<div class="card-actions">

<span onclick="abrirWhats('${v.contato}')">💬</span>

<span onclick="copiarCard('${v.id}')">📋</span>

<span onclick="editarVisita('${v.id}')">✏</span>

<span onclick="marcarVisitado('${v.id}',${v.concluida})">✔</span>

<span onclick="apagarVisita('${v.id}')">🗑</span>

</div>

</div>

`;

});

}

/* RESTANTE DO CÓDIGO CONTINUA EXATAMENTE IGUAL */

</script>

<style>

body{
margin:0;
font-family:Arial;
background:#e9eef5;
}

header{
background:#0b3a66;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.board{
display:flex;
gap:10px;
padding:10px;
overflow-x:auto;
}

.col{
background:#0b3a66;
color:white;
min-width:230px;
padding:8px;
border-radius:8px;
}

.col.hoje{
border:3px solid gold;
}

.card{
background:white;
color:#333;
padding:8px;
margin-bottom:8px;
border-radius:6px;
display:flex;
justify-content:space-between;
font-size:13px;
}

.card.done{
opacity:0.4;
}

.card-info{
display:flex;
flex-direction:column;
gap:2px;
}

.card-actions{
display:flex;
flex-direction:column;
gap:6px;
font-size:18px;
cursor:pointer;
}

button{
padding:6px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:4px;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:8px;
width:300px;
display:flex;
flex-direction:column;
gap:8px;
}

.modal-box input,
.modal-box textarea{
padding:6px;
}

</style>

</head>

<body>

<header>

<div>Agenda Realiza Online</div>

<div>

<button onclick="semanaAnterior()">⬅ Semana anterior</button>

<button onclick="semanaProxima()">Semana seguinte ➡</button>

<button onclick="ativarNotificacoes()">🔔 Ativar Notificações</button>

</div>

</header>

<div class="board" id="board"></div>

<div class="modal" id="modal">

<div class="modal-box">

<input type="hidden" id="modalData">

<label>Cliente</label>
<input id="cliente">

<label>Contato</label>
<input id="contato">

<label>Imóvel</label>
<input id="imovel">

<label>Hora</label>
<input type="time" id="hora">

<label>Despertar antes</label>
<input type="number" id="despertar">

<label>Observação</label>
<textarea id="obs"></textarea>

<button onclick="salvarVisita()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>

</div>

</body>
</html>
